<style>
  :root{
    --bg:#FFFFFF; --surface:#F4F5F9; --surface-2:#ECEDF5; --border:#E7E8F0;
    --primary:#7B5AF7; --primary-dark:#5F3DDB; --accent:#FF5C87; --text:#161721;
    --muted:#8A8DA3; --danger:#F0483E; --radius:16px; --header-h:60px;
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:var(--bg); color:var(--text); font-family:'Nunito',sans-serif;
    -webkit-tap-highlight-color:transparent; overflow-x:hidden;
    padding-bottom: env(safe-area-inset-bottom);
  }
  h1,h2,h3,.logo,.cat-chip,.btn,.section-title{font-family:'Baloo 2',cursive;}
  a{color:inherit; text-decoration:none;}
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
  img{display:block; max-width:100%;}

  /* ---------- header ---------- */
  header{
    position:sticky; top:0; z-index:40; height:var(--header-h);
    display:flex; align-items:center; gap:10px; padding: 0 14px;
    background:#FFFFFF; border-bottom:1px solid var(--border);
  }
  .logo{
    display:flex; align-items:center; gap:7px;
    font-weight:800; font-size:20px; letter-spacing:0.2px; white-space:nowrap;
  }
  .logo-mark{
    width:28px; height:28px; flex-shrink:0;
    background:linear-gradient(135deg,var(--primary),var(--accent)); border-radius:9px;
  }
  .logo span{color:var(--primary);}

  .search-wrap{
    flex:1; display:flex; align-items:center; background:var(--surface);
    border:1.5px solid var(--border); border-radius:999px; padding:0 12px;
    height:38px; min-width:0;
  }
  .search-wrap svg{flex-shrink:0; opacity:0.5; color:var(--muted);}
  .search-wrap input{
    flex:1; background:transparent; border:none; outline:none;
    color:var(--text); font-size:14px; padding:0 8px; min-width:0;
    font-family:'Nunito',sans-serif;
  }
  .search-wrap input::placeholder{color:var(--muted);}

  .menu-btn{
    width:38px; height:38px; flex-shrink:0; display:flex; align-items:center;
    justify-content:center; background:var(--surface); border-radius:10px;
    border:1.5px solid var(--border); color:var(--text);
  }

  /* ---------- category chips ---------- */
  .cats{
    display:flex; gap:8px; overflow-x:auto; padding:12px 14px; scrollbar-width:none;
  }
  .cats::-webkit-scrollbar{display:none;}
  .cat-chip{
    flex-shrink:0; padding:9px 18px; border-radius:999px; background:var(--surface);
    border:1.5px solid var(--border); font-size:15px; font-weight:600;
    letter-spacing:0.2px; color:var(--text); transition:.15s;
  }
  .cat-chip.active{
    background:var(--primary); color:#fff; border-color:var(--primary);
    box-shadow:0 4px 12px rgba(123,90,247,0.35);
  }

  /* ---------- hero ---------- */
  .hero{
    margin:6px 14px 18px; padding:22px 20px; border-radius:20px;
    background:linear-gradient(120deg, var(--primary), #A78BFA 55%, var(--accent));
    position:relative; overflow:hidden;
  }
  .hero h1{font-size:23px; font-weight:800; line-height:1.25; max-width:78%; color:#fff;}
  .hero p{
    color:rgba(255,255,255,0.9); font-size:13.5px; margin-top:6px;
    max-width:78%; font-weight:600;
  }
  .hero-glow{
    position:absolute; right:-20px; bottom:-30px; width:110px; height:110px;
    border-radius:50%; background:rgba(255,255,255,0.18);
  }

  /* ---------- section ---------- */
  main{padding:0 14px 40px;}
  .section-title{
    font-size:19px; font-weight:800; letter-spacing:0.2px; margin:22px 0 12px; color:var(--text);
  }

  /* ---------- game grid ---------- */
  .grid{display:grid; grid-template-columns:repeat(2, 1fr); gap:12px;}
  @media(min-width:480px){ .grid{grid-template-columns:repeat(3,1fr);} }
  @media(min-width:720px){ .grid{grid-template-columns:repeat(4,1fr);} }
  @media(min-width:980px){ .grid{grid-template-columns:repeat(5,1fr);} }

  .card{
    background:#fff; border:1px solid var(--border); border-radius:var(--radius);
    overflow:hidden; display:flex; flex-direction:column;
    box-shadow:0 2px 8px rgba(22,23,33,0.06);
    transition:transform .15s ease, box-shadow .15s ease;
    -webkit-tap-highlight-color:transparent; cursor:pointer;
  }
  .card:active{ transform:scale(0.96); }
  @media(hover:hover){
    .card:hover{ box-shadow:0 10px 24px rgba(22,23,33,0.14); transform:translateY(-3px); }
  }

  .thumb{
    position:relative; aspect-ratio:4/3; display:flex; align-items:center;
    justify-content:center;
  }
  .thumb .play-badge{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:rgba(0,0,0,0.3); opacity:0; transition:.15s;
  }
  .card:active .play-badge{ opacity:1; }
  @media(hover:hover){ .card:hover .play-badge{ opacity:1; } }
  .play-badge svg{ width:38px; height:38px; filter:drop-shadow(0 2px 6px rgba(0,0,0,0.5)); }

  .card-info{ padding:8px 10px 10px; }
  .card-title{ font-size:14px; font-weight:700; line-height:1.3; color:var(--text); }
  .card-tag{ font-size:11.5px; color:var(--muted); margin-top:2px; font-weight:600; }

  /* ---------- footer ---------- */
  footer{
    padding:24px 14px 32px; border-top:1px solid var(--border);
    color:var(--muted); font-size:12.5px; text-align:center; background:var(--surface);
  }
  footer .logo{ justify-content:center; margin-bottom:8px; }
  footer .logo-mark{ width:22px; height:22px; border-radius:7px; }

  /* ---------- game modal / player ---------- */
  .player-overlay{
    position:fixed; inset:0; z-index:100; background:#05060B; display:none; flex-direction:column;
  }
  .player-overlay.open{ display:flex; }

  .player-topbar{
    height:52px; flex-shrink:0; display:flex; align-items:center; gap:6px;
    padding:0 8px; padding-top: env(safe-area-inset-top); background:#FFFFFF;
    border-bottom:1px solid var(--border);
  }
  .player-topbar .title{
    flex:1; font-family:'Baloo 2',cursive; font-weight:700; font-size:16px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding-left:4px;
    color:var(--text);
  }
  .icon-btn{
    width:40px; height:40px; flex-shrink:0; display:flex; align-items:center;
    justify-content:center; border-radius:10px; background:var(--surface);
    border:1.5px solid var(--border); color:var(--text);
  }
  .icon-btn:active{ background:var(--surface-2); }
  .icon-btn.exit{ background:rgba(240,72,62,0.1); border-color:rgba(240,72,62,0.25); }
  .icon-btn.exit svg{ color:var(--danger); }

  .player-frame-wrap{
    flex:1; position:relative; overflow:hidden; background:#000;
    display:flex; align-items:center; justify-content:center;
  }
  .player-frame-wrap iframe{
    width:100%; height:100%; border:0; display:block; background:#000;
  }

  .player-frame-wrap.force-landscape{
    position:fixed; top:50%; left:50%; width:100vh; height:100vw;
    transform:translate(-50%,-50%) rotate(90deg); transform-origin:center center;
  }

  .player-loading{
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:12px; color:var(--muted); font-size:13px;
  }
  .spinner{
    width:34px; height:34px; border-radius:50%; border:3px solid #2A2C38;
    border-top-color:var(--primary); animation:spin 0.8s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .hidden{ display:none !important; }
</style>
</head>

  { id:"s9", title:"Baseball Hero", cat:"sports", thumb:"https://picsum.photos/seed/sports9/400/300", embed:"https://www.crazygames.com/embed/baseball" },

  { id:"s11", title:"Table Tennis Pro", cat:"sports", thumb:"https://picsum.photos/seed/sports11/400/300", embed:"https://www.crazygames.com/embed/table-tennis" },

];

/* ---------------- render game grid (Image updated) ---------------- */
const grid = document.getElementById('gameGrid');

function renderGames(list){
  grid.innerHTML = "";
  if(list.length === 0){
    grid.innerHTML = '<p style="grid-column:1/-1;color:var(--muted);text-align:center;padding:30px 0;">No games found.</p>';
    return;
  }
  list.forEach(game=>{
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <!-- THUMBNAIL MEIN AB IMAGE LOAD HOGI -->
      <div class="thumb" style="background: url('${game.thumb}') center/cover no-repeat; background-color: var(--surface-2);">
        <div class="play-badge">
          <svg viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>
      <div class="card-info">
        <div class="card-title">${game.title}</div>
        <div class="card-tag">${game.cat.charAt(0).toUpperCase()+game.cat.slice(1)}</div>
      </div>
    `;
    card.addEventListener('click', ()=> openGame(game));
    grid.appendChild(card);
  });
}
renderGames(GAMES);

/* ---------------- category filter ---------------- */
document.querySelectorAll('.cat-chip').forEach(chip=>{
  chip.addEventListener('click', ()=>{
    document.querySelectorAll('.cat-chip').forEach(c=>c.classList.remove('active'));
    chip.classList.add('active');
    const cat = chip.dataset.cat;
    renderGames(cat === 'all' ? GAMES : GAMES.filter(g=>g.cat===cat));
  });
});

/* ---------------- search filter ---------------- */
document.getElementById('searchInput').addEventListener('input', (e)=>{
  const q = e.target.value.trim().toLowerCase();
  renderGames(GAMES.filter(g=>g.title.toLowerCase().includes(q)));
});

/* ================= GAME PLAYER LOGIC ================= */
const overlay      = document.getElementById('playerOverlay');
const frameWrap    = document.getElementById('frameWrap');
const gameFrame    = document.getElementById('gameFrame');
const playerTitle  = document.getElementById('playerTitle');
const playerLoading= document.getElementById('playerLoading');

let isLandscapeForced = false;

function openGame(game){
  if(!game.embed){
    alert("Game URL missing!");
    return;
  }
  playerTitle.textContent = game.title;
  playerLoading.classList.remove('hidden');
  gameFrame.src = game.embed;
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

gameFrame.addEventListener('load', ()=>{
  if(gameFrame.src) playerLoading.classList.add('hidden');
});

function closePlayer(){
  overlay.classList.remove('open');
  gameFrame.src = ""; 
  document.body.style.overflow = '';
  frameWrap.classList.remove('force-landscape');
  isLandscapeForced = false;
  if(document.fullscreenElement) document.exitFullscreen().catch(()=>{});
}

document.getElementById('btnClose').addEventListener('click', closePlayer);
document.getElementById('btnExit').addEventListener('click', closePlayer);

/* ---- Rotate button ---- */
document.getElementById('btnRotate').addEventListener('click', async ()=>{
  try{
    if(!document.fullscreenElement){
      await overlay.requestFullscreen();
    }
    if(screen.orientation && screen.orientation.lock){
      const current = screen.orientation.type.includes('landscape') ? 'portrait' : 'landscape';
      await screen.orientation.lock(current);
      return;
    }
  }catch(err){}
  isLandscapeForced = !isLandscapeForced;
  frameWrap.classList.toggle('force-landscape', isLandscapeForced);
});

/* ---- Fullscreen button ---- */
document.getElementById('btnFullscreen').addEventListener('click', ()=>{
  if(!document.fullscreenElement){
    overlay.requestFullscreen().catch(()=>{});
  }else{
    document.exitFullscreen().catch(()=>{});
  }
});

/* Close on Escape */
document.addEventListener('keydown', (e)=>{
  if(e.key === 'Escape' && overlay.classList.contains('open')) closePlayer();
});
</script>
