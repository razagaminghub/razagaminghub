<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RazaGamingHub - Play Free Online Games</title>
    <style>
        /* === COLOR PALETTE & DARK MODE === */
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --accent-color: #00e676; /* Neon green accent for gaming vibe */
            border-radius: 18px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* === FLOATING HEADER (Poki Style) === */
        .floating-menu {
            position: fixed;
            top: 20px;
            left: 20px;
            background-color: var(--card-bg);
            padding: 15px 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.6);
            z-index: 1000;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-main);
            text-decoration: none;
            letter-spacing: 1px;
        }

        .logo span {
            color: var(--accent-color);
        }

        .menu-icons {
            display: flex;
            gap: 15px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 18px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .icon-btn:hover {
            color: var(--accent-color);
        }

        /* === SMOOTH FILTER SYSTEM === */
        .filter-section {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            overflow-x: auto;
            padding-bottom: 5px;
        }
        .filter-section::-webkit-scrollbar { height: 0px; }
        .filter-btn {
            background: var(--card-bg); border: 1px solid #333; color: var(--text-main);
            padding: 8px 18px; border-radius: 20px; cursor: pointer;
            font-weight: bold; transition: all 0.3s; white-space: nowrap;
        }
        .filter-btn:hover, .filter-btn.active {
            background: var(--accent-color); color: #000; border-color: var(--accent-color);
        }

        /* === MAIN GAME GRID === */
        main {
            padding: 100px 20px 40px 20px;
            max-width: 1400px;
            margin: 0 auto;
            min-height: 80vh;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            grid-auto-rows: 130px;
            gap: 15px;
        }

        .game-card {
            background-color: var(--card-bg);
            border-radius: 18px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            text-align: center;
        }

        .game-card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0, 230, 118, 0.3); /* Neon glow */
            z-index: 10;
        }

        /* Dynamic Image & Video Overlays */
        .game-card img {
            width: 100%; height: 100%; object-fit: cover; transition: opacity 0.3s;
        }
        .hover-video { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: cover; z-index: 2;
        }
        .game-title {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 20px 10px 10px; font-size: 14px; color: #fff;
            z-index: 3; pointer-events: none; text-align: center;
        }

        /* Poki Masonry Style Sizing */
        .card-large { grid-column: span 2; grid-row: span 2; }
        .card-large .game-title { font-size: 18px; }
        .card-wide { grid-column: span 2; grid-row: span 1; }
        .card-tall { grid-column: span 1; grid-row: span 2; }

        /* === SKELETON LOADING SCREEN === */
        .skeleton {
            background: linear-gradient(90deg, #1e1e1e 25%, #2a2a2a 50%, #1e1e1e 75%);
            background-size: 400% 100%;
            animation: skeleton-loading 1.5s infinite ease-in-out;
            pointer-events: none;
        }
        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* === THEATER MODE === */
        .theater-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 9999; 
            justify-content: center; align-items: center; flex-direction: column;
            backdrop-filter: blur(5px);
        }
        .theater-modal.active { display: flex; }
        .close-btn {
            position: absolute; top: 20px; right: 30px;
            background: #ff4757; color: white; border: none;
            padding: 10px 20px; font-size: 16px; border-radius: 8px;
            cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .close-btn:hover { background: #ff6b81; }
        .iframe-container {
            width: 85%; height: 85%; background: #000;
            border-radius: 12px; overflow: hidden; border: 2px solid var(--accent-color);
        }
        iframe { width: 100%; height: 100%; border: none; }
        
        .loading-text { text-align: center; padding: 20px; color: var(--accent-color); display: none; font-weight: bold; }

        /* === CATEGORIES SECTION === */
        .section-title { margin: 40px 0 20px 0; font-size: 24px; }
        .category-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .cat-card {
            background-color: var(--card-bg); border-radius: 18px; height: 120px;
            display: flex; flex-direction: column; justify-content: flex-end; padding: 15px;
            cursor: pointer; transition: transform 0.2s ease; background-size: cover; background-position: center;
        }
        .cat-card:hover { transform: translateY(-5px); }
        .cat-title { font-size: 16px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }

        /* === FOOTER === */
        footer { background-color: var(--card-bg); padding: 50px 20px; margin-top: 50px; }
        .footer-content { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 40px; }
        .footer-col h3 { color: var(--accent-color); margin-bottom: 20px; font-size: 16px; text-transform: uppercase; }
        .footer-col ul { list-style: none; }
        .footer-col ul li { margin-bottom: 12px; }
        .footer-col ul li a { color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
        .footer-col ul li a:hover { color: var(--text-main); }
        
        @media (max-width: 768px) {
            .floating-menu { width: calc(100% - 40px); justify-content: space-between; }
            main { padding-top: 100px; }
        }
    </style>
</head>
<body>

    <!-- Floating Header Navigation -->
    <nav class="floating-menu">
        <a href="#" class="logo">Raza<span>Gaming</span>Hub</a>
        <div class="menu-icons">
            <button class="icon-btn" onclick="alert('Search feature coming soon!')">🔍</button>
            <button class="icon-btn">👤</button>
        </div>
    </nav>

    <main>
        <!-- Filter System -->
        <div class="filter-section" id="filter-container">
            <button class="filter-btn active" data-filter="All">All Games</button>
            <button class="filter-btn" data-filter="Action">Action</button>
            <button class="filter-btn" data-filter="Racing">Racing</button>
            <button class="filter-btn" data-filter="Puzzle">Puzzle</button>
        </div>

        <!-- Dynamic Game Grid -->
        <div class="game-grid" id="game-grid">
            <!-- JavaScript will load games here -->
        </div>
        <div class="loading-text" id="loading-more">Fetching More Games... 🎮</div>

        <!-- Categories Section -->
        <h2 class="section-title">Popular Categories</h2>
        <div class="category-grid">
            <div class="cat-card" style="background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.8)), #ff7675;">
                <span class="cat-title">2 Player Games</span>
            </div>
            <div class="cat-card" style="background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.8)), #74b9ff;">
                <span class="cat-title">Car Games</span>
            </div>
            <div class="cat-card" style="background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.8)), #a29bfe;">
                <span class="cat-title">Puzzle Games</span>
            </div>
            <div class="cat-card" style="background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.8)), #fdcb6e;">
                <span class="cat-title">Shooting Games</span>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div class="footer-col">
                <h3>Popular</h3>
                <ul>
                    <li><a href="#">Car Games</a></li>
                    <li><a href="#">.io Games</a></li>
                    <li><a href="#">2 Player Games</a></li>
                </ul>
            </div>
            <div class="footer-col">
                <h3>Help and Support</h3>
                <ul>
                    <li><a href="#">FAQ</a></li>
                    <li><a href="#">Contact</a></li>
                    <li><a href="#">Privacy Center</a></li>
                </ul>
            </div>
            <div class="footer-col">
                <h3>Get to Know Us</h3>
                <ul>
                    <li><a href="#">About RazaGamingHub</a></li>
                    <li><a href="#">For Developers</a></li>
                </ul>
            </div>
        </div>
    </footer>

    <!-- Theater Mode Modal -->
    <div class="theater-modal" id="theater">
        <button class="close-btn" onclick="closeTheater()">X Close Game</button>
        <div class="iframe-container">
            <iframe id="game-iframe" src="" allowfullscreen></iframe>
        </div>
    </div>

    <!-- MAIN JAVASCRIPT LOGIC -->
    <script>
        // Placeholder Video URL for Hover Preview (Replace with real game short clips)
        const sampleVid = "https://www.w3schools.com/html/mov_bbb.mp4";
        
        // 1. GAME DATABASE (Add your games here)
        const gamesList = [
            { id: 1, title: "Top Racing 3D", category: "Racing", size: "card-large", img: "https://images.unsplash.com/photo-1547394765-185e1e68f34e?w=500", vid: sampleVid, playUrl: "https://en.wikipedia.org/wiki/Racing_game" },
            { id: 2, title: "Subway Runner", category: "Action", size: "", img: "https://images.unsplash.com/photo-1552820728-8b83bb6b773f?w=500", vid: sampleVid, playUrl: "https://en.wikipedia.org/wiki/Endless_runner" },
            { id: 3, title: "Ludo King Pro", category: "Puzzle", size: "", img: "https://images.unsplash.com/photo-1610890716171-6b1bb98ffaed?w=500", vid: sampleVid, playUrl: "https://en.wikipedia.org/wiki/Ludo" },
            { id: 4, title: "Stickman Ninja", category: "Action", size: "card-tall", img: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=500", vid: sampleVid, playUrl: "https://en.wikipedia.org/wiki/Action_game" },
            { id: 5, title: "Chess Master", category: "Puzzle", size: "", img: "https://images.unsplash.com/photo-1529699211952-734e80c4d42b?w=500", vid: sampleVid, playUrl: "https://en.wikipedia.org/wiki/Chess" },
            { id: 6, title: "Sniper Assassin", category: "Action", size: "card-wide", img: "https://images.unsplash.com/photo-1509228627152-72ae9ae6848d?w=500", vid: sampleVid, playUrl: "https://en.wikipedia.org/wiki/Shooter_game" },
            { id: 7, title: "Puzzle Box", category: "Puzzle", size: "", img: "https://images.unsplash.com/photo-1611162617474-5b21e879e113?w=500", vid: sampleVid, playUrl: "https://en.wikipedia.org/wiki/Puzzle_video_game" },
            { id: 8, title: "Water Sort", category: "Puzzle", size: "", img: "https://images.unsplash.com/photo-1605806616949-1e87b487cb2a?w=500", vid: sampleVid, playUrl: "https://en.wikipedia.org/wiki/Puzzle_video_game" },
            { id: 9, title: "Monster Truck", category: "Racing", size: "card-large", img: "https://images.unsplash.com/photo-1511512578047-dfb367046420?w=500", vid: sampleVid, playUrl: "https://en.wikipedia.org/wiki/Racing_game" },
            { id: 10, title: "Bike Mania", category: "Racing", size: "card-wide", img: "https://images.unsplash.com/photo-1558981806-ec527fa84c39?w=500", vid: sampleVid, playUrl: "https://en.wikipedia.org/wiki/Racing_game" },
            { id: 11, title: "Zombie Defense", category: "Action", size: "card-tall", img: "https://images.unsplash.com/photo-1542751371-adc38448a05e?w=500", vid: sampleVid, playUrl: "https://en.wikipedia.org/wiki/Tower_defense" },
            { id: 12, title: "Color Jump", category: "Puzzle", size: "", img: "https://images.unsplash.com/photo-1580234811497-9df7fd2f357e?w=500", vid: sampleVid, playUrl: "https://en.wikipedia.org/wiki/Platform_game" }
        ];

        let activeCategory = "All";
        let loadingState = false;
        const gameGrid = document.getElementById('game-grid');

        // 2. SKELETON LOADING
        function displaySkeletons(amount = 12) {
            gameGrid.innerHTML = "";
            const sizesArray = ["", "card-large", "card-wide", "card-tall"];
            for (let i = 0; i < amount; i++) {
                const randomSize = sizesArray[Math.floor(Math.random() * sizesArray.length)];
                gameGrid.innerHTML += `<div class="game-card skeleton ${randomSize}"></div>`;
            }
        }

        // 3. RENDER GAMES DYNAMICALLY
        function populateGames(gamesData, shouldAppend = false) {
            if (!shouldAppend) gameGrid.innerHTML = ""; 
            
            gamesData.forEach(item => {
                const card = document.createElement('div');
                card.className = `game-card ${item.size}`;
                card.onclick = () => openTheater(item.playUrl);
                
                card.innerHTML = `
                    <img src="${item.img}" alt="${item.title}" loading="lazy">
                    <div class="game-title">${item.title}</div>
                `;

                // Hover Video Logic (Injected on mouseenter to save browser memory)
                card.addEventListener('mouseenter', () => {
                    const videoElem = document.createElement('video');
                    videoElem.src = item.vid;
                    videoElem.muted = true; videoElem.loop = true; videoElem.autoplay = true;
                    videoElem.className = "hover-video";
                    card.insertBefore(videoElem, card.firstChild);
                });

                card.addEventListener('mouseleave', () => {
                    const videoElem = card.querySelector('.hover-video');
                    if(videoElem) videoElem.remove();
                });

                gameGrid.appendChild(card);
            });
        }

        // Initial setup
        displaySkeletons();
        setTimeout(() => {
            populateGames(gamesList);
        }, 1200);

        // 4. SMOOTH FILTERS
        document.querySelectorAll('.filter-btn').forEach(button => {
            button.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                
                activeCategory = e.target.getAttribute('data-filter');
                displaySkeletons(8);
                
                setTimeout(() => {
                    const filtered = activeCategory === "All" 
                        ? gamesList 
                        : gamesList.filter(g => g.category === activeCategory);
                    populateGames(filtered);
                }, 400); 
            });
        });

        // 5. INFINITE SCROLLING
        window.addEventListener('scroll', () => {
            const { scrollTop, scrollHeight, clientHeight } = document.documentElement;
            
            if (scrollTop + clientHeight >= scrollHeight - 200 && !loadingState && activeCategory === "All") {
                loadingState = true;
                document.getElementById('loading-more').style.display = "block";
                
                setTimeout(() => {
                    // Demo logic: Appending duplicated games to simulate continuous scrolling
                    const newBatch = gamesList.map(g => ({...g, id: Math.random()})); 
                    populateGames(newBatch, true); 
                    
                    document.getElementById('loading-more').style.display = "none";
                    loadingState = false;
                }, 1000);
            }
        });

        // 6. THEATER MODE (IN-SITE PLAY)
        function openTheater(sourceUrl) {
            const modal = document.getElementById('theater');
            const iframe = document.getElementById('game-iframe');
            
            iframe.src = sourceUrl; 
            modal.classList.add('active');
            document.body.style.overflow = 'hidden'; // Prevents background scrolling
        }

        function closeTheater() {
            const modal = document.getElementById('theater');
            const iframe = document.getElementById('game-iframe');
            
            modal.classList.remove('active');
            iframe.src = ""; // Stops audio/video from playing in background
            document.body.style.overflow = 'auto'; 
        }
    </script>
</body>
</html>
